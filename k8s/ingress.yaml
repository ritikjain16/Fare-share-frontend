apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fareshare-ingress
  namespace: fareshare
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fareshare-frontend-service
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fareshare-backend-service
                port:
                  number: 3000
